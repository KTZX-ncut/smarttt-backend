# 应用服务 WEB 访问端口
server.port=8085

# Springfox 2.9.2 不兼容 Spring Boot 2.7 默认的 PathPatternParser，必须切换为 ant_path_matcher
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# 数据源配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.url=jdbc:mysql://120.46.201.4:10200/smarttt_rebuild?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8&useSSL=false
spring.datasource.username=root
spring.datasource.password=@Dwl1234567890

# Python 路径（默认python用于服务器/Docker，本地开发在IDE VM options覆盖：-Dpython.path=D:/anaconda/envs/shixun/python.exe）
python.path=python

# MyBatis-Plus 配置
mybatis-plus.configuration.map-underscore-to-camel-case=false
mybatis-plus.mapper-locations=classpath*:/com/example/smartttexam/mapper/*.xml
